<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบค้นหานิสิต</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Sarabun', 'sans-serif'],
            heading: ['Outfit', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    html, body { height: 100%; margin: 0; box-sizing: border-box; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .chip-active { background: var(--accent); color: #fff; }
    .chip-inactive { background: var(--chip-bg); color: var(--text-secondary); }
    :root {
      --bg: #f0f9ff;
      --surface: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --accent: #0ea5e9;
      --chip-bg: #e0f2fe;
    }
  </style>
 </head>
 <body class="h-full overflow-auto" style="background: var(--bg); color: var(--text-primary); font-family: 'Sarabun', sans-serif;">
  <div class="w-full h-full flex flex-col">
   
   <header class="w-full px-4 pt-8 pb-4 text-center border-b" style="border-color:var(--chip-bg)">
    <div class="flex items-center justify-center gap-6 mb-4">
     
     <div class="w-14 h-14 rounded-xl flex items-center justify-center shadow-md overflow-hidden bg-white" style="border: 1px solid var(--chip-bg);">
      <img src="https://scontent.fkkc3-1.fna.fbcdn.net/v/t39.30808-6/642768993_1941877609748834_2263063250765183521_n.jpg?_nc_cat=109&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeFgdVRxMzDQoMn_WZ3PKav5HKXoF5YiSVocpegXliJJWomRnl3-W1ZkXpnF-IHRvyL-fqoXXFSj7bIqslzyZ2kK&_nc_ohc=D3hslI5noOcQ7kNvwEZCOkh&_nc_oc=AdpzTyXAxzkUwNmiv7xoPPzQdVfn7XrH0cne9U0WiA3t-PdDyq6Cnagce4GdkN-Z594&_nc_zt=23&_nc_ht=scontent.fkkc3-1.fna&_nc_gid=A1YAwRNA8WAd7qqWPtfy1w&_nc_ss=7a3a8&oh=00_Af1tvN_LBbsxZWRy_AEJSErkII3J5YN2Bj4h2vBkEK_Bsg&oe=69D99D6B" alt="โลโก้ 1" class="w-full h-full object-contain p-1">
     </div>

     <div class="w-14 h-14 rounded-xl flex items-center justify-center shadow-md overflow-hidden bg-white" style="border: 1px solid var(--chip-bg);">
      <img src="https://scontent.fkkc3-1.fna.fbcdn.net/v/t39.30808-6/663053337_1971148600155068_3543915145222936824_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeH0Ylb-hwgqKTpvN3dV2BcaaZUZ0G2osN9plRnQbaiw339LeWYPMKzBDUJPM9YrxnTPMRu26kuL22h_IzA5vO7I&_nc_ohc=WxkA3eR4_cIQ7kNvwFGigRs&_nc_oc=Adq49YX577SeSQnqokO-GBomMGUxo_QKEiyFtrmHEBZwTV3Qm1Pn1EjzMqEG2DYybyw&_nc_zt=23&_nc_ht=scontent.fkkc3-1.fna&_nc_gid=hVEZ57RbOe_YUx0iXkwezw&_nc_ss=7a3a8&oh=00_Af3xfAjYXji62yqQxrTuS87nQPEGQogKqzz-koPF3uneqQ&oe=69D97F98" alt="โลโก้ 2" class="w-full h-full object-contain p-1">
     </div>

     <div class="w-14 h-14 rounded-xl flex items-center justify-center shadow-md overflow-hidden bg-white" style="border: 1px solid var(--chip-bg);">
      <img src="https://scontent.fkkc3-1.fna.fbcdn.net/v/t39.30808-6/642355807_1941877579748837_136105529239050778_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeGoNuB4kdc4TXH0TTSJ2BniBfekBKi2L8kF96QEqLYvyV1eX4MSCorpCd_C4Kc1KUmZoO3IjylYjRUPPKxesC1I&_nc_ohc=isRuaGls4NMQ7kNvwEhE-A2&_nc_oc=AdpydyVW6rnYI0PXr5c_U8jBjtQ9cdnrVuI3kzLQupuwP8GGBhtWY2Dz99b2E9o1l08&_nc_zt=23&_nc_ht=scontent.fkkc3-1.fna&_nc_gid=dIhUUZKo5bWE8fsJ6wycxw&_nc_ss=7a3a8&oh=00_Af1UVhHL9T7DLNlTza9rWqbdfgogq0kFPhWPEKTZy5IiCw&oe=69D99CEB" alt="โลโก้ 3" class="w-full h-full object-contain p-1">
     </div>

    </div>
    <div>
     <h1 id="pageTitle" class="text-2xl font-bold tracking-tight" style="font-family:'Outfit',sans-serif; color:var(--text-primary)">ระบบค้นหานิสิต</h1>
    </div>
    <p style="color:var(--text-secondary)" class="text-sm mt-2">ค้นหาจากชื่อ นามสกุล หรือรหัสนิสิต</p>
   </header>
   
   <div class="w-full max-w-2xl mx-auto px-4 mb-4 mt-4">
    <div class="relative">
     <i data-lucide="search" style="width:18px;height:18px;color:var(--text-secondary)" class="absolute left-3 top-1/2 -translate-y-1/2"></i> 
     <input id="searchInput" type="text" placeholder="พิมพ์ชื่อ นามสกุล หรือรหัสนิสิต..." class="w-full pl-10 pr-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500/50 transition" style="background:var(--surface); color:var(--text-primary); border:1px solid var(--chip-bg);">
    </div>
   </div>
   
   <div class="w-full max-w-2xl mx-auto px-4 mb-2">
    <div class="flex items-center gap-2 mb-2 flex-wrap">
     <span class="text-xs font-medium" style="color:var(--text-secondary)">ชั้นปี:</span> 
     <button onclick="toggleYear('all')" id="yr-all" class="chip-active px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer">ทั้งหมด</button> 
     <button onclick="toggleYear(1)" id="yr-1" class="chip-inactive px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer">ปี 1</button> 
     <button onclick="toggleYear(2)" id="yr-2" class="chip-inactive px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer">ปี 2</button> 
     <button onclick="toggleYear(3)" id="yr-3" class="chip-inactive px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer">ปี 3</button> 
     <button onclick="toggleYear(4)" id="yr-4" class="chip-inactive px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer">ปี 4</button>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
     <span class="text-xs font-medium" style="color:var(--text-secondary)">เซค:</span> 
     <button onclick="toggleSec('all')" id="sec-all" class="chip-active px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer">ทั้งหมด</button> 
     <button onclick="toggleSec(1)" id="sec-1" class="chip-inactive px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer">เซค 1</button> 
     <button onclick="toggleSec(2)" id="sec-2" class="chip-inactive px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer">เซค 2</button> 
     <button onclick="toggleSec(3)" id="sec-3" class="chip-inactive px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer">เซค 3</button>
    </div>
   </div>
   
   <div class="w-full max-w-2xl mx-auto px-4 py-2 flex items-center justify-between">
    <span id="resultCount" class="text-xs font-medium" style="color:var(--text-secondary)">กำลังเชื่อมต่อฐานข้อมูล...</span>
   </div>
   
   <div class="w-full max-w-2xl mx-auto px-4 pb-8 flex-1 overflow-auto">
    <div id="results" class="space-y-2"></div>
    <div id="emptyState" class="text-center py-12 hidden">
     <i data-lucide="users" style="width:48px;height:48px;color:var(--chip-bg)" class="mx-auto mb-3"></i>
     <p class="text-sm" style="color:var(--text-secondary)">ไม่พบข้อมูลนิสิต (หรืออาจกำลังโหลด)</p>
    </div>
   </div>
  </div>

  <script>
  // เชื่อมต่อกับ Google Sheets API
  const SHEET_API_URL = "https://script.google.com/macros/s/AKfycby4I40NJr6AoadWsgRNwtMqvOvEuzRHDe13rUgRDBafK9K1VdOuNcHzl1rez6NfaAJ3SA/exec";
  
  let students = []; 
  let selectedYear = 'all';
  let selectedSec = 'all';

  // ฟังก์ชันดึงข้อมูลจาก Google Sheets
  async function fetchStudents() {
    try {
      const response = await fetch(SHEET_API_URL);
      students = await response.json();
      search(); 
    } catch (error) {
      console.error("Error fetching data:", error);
      document.getElementById('resultCount').textContent = "เกิดข้อผิดพลาดในการโหลดข้อมูล โปรดลองรีเฟรชหน้าเว็บ";
    }
  }

  function toggleYear(y) {
    selectedYear = y;
    ['all',1,2,3,4].forEach(v => {
      const el = document.getElementById('yr-' + v);
      if(el) el.className = v === y ? 'chip-active px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer' : 'chip-inactive px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer';
    });
    search();
  }

  function toggleSec(s) {
    selectedSec = s;
    ['all',1,2,3].forEach(v => {
      const el = document.getElementById('sec-' + v);
      if(el) el.className = v === s ? 'chip-active px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer' : 'chip-inactive px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer';
    });
    search();
  }

  function search() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let filtered = students.filter(s => {
      if (selectedYear !== 'all' && s.year !== selectedYear) return false;
      if (selectedSec !== 'all' && s.section !== selectedSec) return false;
      if (!q) return true;
      const full = String(s.id || '') + (s.name || '') + (s.surname || '');
      const last3 = String(s.id || '').slice(-3);
      const last4 = String(s.id || '').slice(-4);
      return (s.name || '').includes(q) || (s.surname || '').includes(q) || String(s.id || '').includes(q) || last3 === q || last4 === q || full.toLowerCase().includes(q);
    });

    const container = document.getElementById('results');
    const empty = document.getElementById('emptyState');
    document.getElementById('resultCount').textContent = `พบ ${filtered.length} คน`;

    if (filtered.length === 0) {
      container.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    container.innerHTML = filtered.map((s, i) => `
      <div class="fade-in flex items-center gap-3 p-3 rounded-xl transition hover:shadow-md" style="background:var(--surface); border:1px solid var(--chip-bg); animation-delay:${i * 30}ms">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center text-sm font-bold shrink-0" style="background:${yearColor(s.year)};color:#fff">
          ${s.name ? s.name[0] : '-'}
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-sm truncate">${highlight((s.name || '') + ' ' + (s.surname || ''), document.getElementById('searchInput').value.trim())}</div>
          <div class="text-xs" style="color:var(--text-secondary)">${highlight(String(s.id || ''), document.getElementById('searchInput').value.trim())}</div>
        </div>
        <div class="text-right shrink-0">
          <span class="text-xs px-2 py-0.5 rounded-lg font-medium" style="background:${yearColor(s.year)}22;color:${yearColor(s.year)}">ปี ${s.year || '-'}</span>
          <div class="text-xs mt-1" style="color:var(--text-secondary)">เซค ${s.section || '-'}</div>
        </div>
      </div>
    `).join('');
  }

  function yearColor(y) {
    return ['#0ea5e9','#8b5cf6','#f59e0b','#10b981'][y - 1] || '#0ea5e9';
  }

  function highlight(text, query) {
    if (!query) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return text.slice(0, idx) + '<mark style="background:#0ea5e940;color:var(--text-primary);border-radius:2px;padding:0 1px">' + text.slice(idx, idx + query.length) + '</mark>' + text.slice(idx + query.length);
  }

  document.getElementById('searchInput').addEventListener('input', search);

  // เริ่มต้นการทำงาน
  lucide.createIcons();
  fetchStudents();
</script>
</body>
</html>
